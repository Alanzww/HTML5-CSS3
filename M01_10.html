<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica  (Responsividade)</h1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou apenas aumente e diminua o tamanho do seu navegador. </p>

    <picture>
        <source media="(max-width: 750px)" srcset="assets/img/hehehecat-300.jpg" type="image/jpeg">

        <source media="(max-width: 1050px)" srcset="assets/img/hehehecat-700.jpg" type="image/jpeg">

        <img src="assets/img/hehehecat-1000.jpg" alt="Imagem flexível">

        <h1>Reproduzindo audio</h1>
        <p>Vamos aprender a reproduzir áudio em HTML5.</p>
        <audio src="assets/mp3/zayde.mp3" controls autoplay></audio>
        <p>Ou para melhor compatibilidade geral podemos utilizar:</p>
        <audio preload="metadata" autoplay controls>
            <source src="assets/mp3/zayde.mp3" type="audio/mpeg">
            <source src="assets/ogg/zayde.ogg" type="audio/ogg">
            <source src="assets/wav/zayde.wav" type="audio/wav">
            
            <p>Seu navegador não suporta o elemento de áudio. <a href="assets/mp3/zayde.mp3">Clique aqui para baixar</a></p>
        </audio>
    </picture>
</body>
</html>
