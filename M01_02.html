<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="widthdevice-width,initial-scale=1.0">
        <title>Parágrafos</title>

    </head>

    <body>
        <h1>Parágrafos e quebra de linha.</h1>
        <hr>
        <p>Você pode escrever
            um parágrafo em várias linhas, mas ele será exibido como um único parágrafo.
        </p>
        <p>Se você quiser quebrar o texto em alguma linha <br> como esse basta usar a tag &lt;br&gt;</p>
    </body>
</html>
